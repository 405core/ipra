services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_AI_SERVICE_BASE_URL: /ai
    container_name: ipra-frontend
    environment:
      SSL_COMMON_NAME: ${SSL_COMMON_NAME:-192.168.124.6}
      SSL_ALT_NAMES: ${SSL_ALT_NAMES:-DNS:localhost,IP:127.0.0.1,IP:192.168.124.6}
      SSL_CERT_DAYS: ${SSL_CERT_DAYS:-3650}
    depends_on:
      backend:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    ports:
      - "${ADMIN_WEB_PORT:-8088}:443"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
        GOSUMDB: ${GOSUMDB:-sum.golang.google.cn}
    container_name: ipra-backend
    environment:
      APP_ENV: prod
      PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-ipra}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-this-db-password}
      DB_NAME: ${POSTGRES_DB:-ipra}
      DB_SSLMODE: disable
      OCR_IDCARD_API_URL: ${OCR_IDCARD_API_URL:-https://jmsfzsbbd.market.alicloudapi.com/ocr/idcard-enhance}
      OCR_IDCARD_APP_CODE: ${OCR_IDCARD_APP_CODE:-}
      OCR_IDCARD_APP_KEY: ${OCR_IDCARD_APP_KEY:-}
      OCR_IDCARD_APP_SECRET: ${OCR_IDCARD_APP_SECRET:-}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-8z8Pr3n4Q9f5GeKM}
      MINIO_BUCKET_VIDEO: ${MINIO_BUCKET_VIDEO:-}
      MINIO_BUCKET: ${MINIO_BUCKET:-ipra-videos}
      MINIO_SECURE: ${MINIO_SECURE:-0}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/api/ping >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  ai-service:
    build:
      context: .
      dockerfile: docker/ai-service/Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-mirrors.aliyun.com}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-https://download.pytorch.org/whl/cu128}
    container_name: ipra-ai-service
    environment:
      AI_SERVICE_HOST: 0.0.0.0
      AI_SERVICE_PORT: 9000
      AI_SERVICE_CORS_ORIGINS: ${AI_SERVICE_CORS_ORIGINS:-http://localhost:8088,http://127.0.0.1:8088}
      HUMANOMNI_MODEL_PATH: ${HUMANOMNI_MODEL_PATH:-/app/models/humanomni0.5/iic/HumanOmni-0___5B}
      HF_HOME: ${HF_HOME:-/app/models/humanomni0.5/huggingface}
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-1}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-1}
      AI_SERVICE_VERBOSE_WARNINGS: ${AI_SERVICE_VERBOSE_WARNINGS:-0}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
      HUMANOMNI_UPLOAD_DIR: /tmp/humanomni-windows
      HUMANOMNI_UPLOAD_MAX_MB: ${HUMANOMNI_UPLOAD_MAX_MB:-200}
      HUMANOMNI_INFER_TIMEOUT_SECONDS: ${HUMANOMNI_INFER_TIMEOUT_SECONDS:-900}
      BUSINESS_LLM_PROVIDER: ${BUSINESS_LLM_PROVIDER:-transformers_local}
      BUSINESS_LLM_MODEL: ${BUSINESS_LLM_MODEL:-Qwen2.5-3B-Instruct}
      BUSINESS_LLM_MODEL_PATH: ${BUSINESS_LLM_MODEL_PATH:-/app/models/business-llm/modelscope/Qwen2.5-3B-Instruct}
      BUSINESS_LLM_TIMEOUT_SECONDS: ${BUSINESS_LLM_TIMEOUT_SECONDS:-300}
      BUSINESS_LLM_MAX_NEW_TOKENS: ${BUSINESS_LLM_MAX_NEW_TOKENS:-768}
      BUSINESS_LLM_TORCH_DTYPE: ${BUSINESS_LLM_TORCH_DTYPE:-auto}
      BUSINESS_LLM_DEVICE_MAP: ${BUSINESS_LLM_DEVICE_MAP:-auto}
      QWEN3_ASR_URL: ${QWEN3_ASR_URL:-ws://47.108.217.127:9090/ws/asr}
      QWEN3_ASR_SAMPLE_RATE: ${QWEN3_ASR_SAMPLE_RATE:-16000}
      QWEN3_ASR_LANGUAGE: ${QWEN3_ASR_LANGUAGE:-Chinese}
      QWEN3_ASR_PARTIAL_INTERVAL_SEC: ${QWEN3_ASR_PARTIAL_INTERVAL_SEC:-2}
      QWEN3_ASR_MIN_AUDIO_SEC: ${QWEN3_ASR_MIN_AUDIO_SEC:-1}
      QWEN3_ASR_MAX_WINDOW_SEC: ${QWEN3_ASR_MAX_WINDOW_SEC:-30}
    volumes:
      - ${MODEL_DIR:-./models}:/app/models:ro
    expose:
      - "9000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health', timeout=5).read()",
        ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: ipra-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ipra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-db-password}
      POSTGRES_DB: ${POSTGRES_DB:-ipra}
      IPRA_SEED_ADMIN_WORK_ID: ${IPRA_SEED_ADMIN_WORK_ID:-admin}
      IPRA_SEED_ADMIN_NAME: ${IPRA_SEED_ADMIN_NAME:-管理员}
      IPRA_SEED_ADMIN_PASSWORD_HASH: ${IPRA_SEED_ADMIN_PASSWORD_HASH:-}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docs/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./docker/postgres/init/02-seed-users.sh:/docker-entrypoint-initdb.d/02-seed-users.sh:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: minio-server
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-8z8Pr3n4Q9f5GeKM}
    volumes:
      - ${MINIO_DATA_DIR:-/docker-data/minio}:/data
    ports:
      - "${MINIO_API_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    expose:
      - "9000"
      - "9001"
    restart: unless-stopped

volumes:
  postgres_data:
